name: Live scoreboards (OCR)

# Llegeix per OCR els marcadors dels directes de YouTube dels opens en curs i els
# publica a Supabase (fcbillar.open_live_scores), perquè el web de FCBillar els
# mostri en viu. Bucle llarg (no s'acaba abans del següent tret → sense forats).
#
# REQUISITS (Settings → Secrets and variables → Actions):
#   - SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#   - YOUTUBE_COOKIES: contingut d'un cookies.txt (format Netscape) exportat del
#     navegador. CAL perquè YouTube bloqueja les IPs de datacenter de GitHub
#     ("Sign in to confirm you're not a bot"). Useu un compte de Google dedicat;
#     les cookies caduquen i s'han de refrescar de tant en tant.
#
# Finestra: dv/ds/dg 9:00–22:00 local (07–20 UTC estiu; hivern CET → '8-21').

on:
  schedule:
    - cron: '*/20 7-20 * * 5,6,0'
  workflow_dispatch: {}

concurrency:
  group: live-scoreboards
  cancel-in-progress: true

jobs:
  ocr:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ffmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Set up Python + PaddleOCR + yt-dlp (pip)
        run: |
          python3 -m venv .venv-paddle
          .venv-paddle/bin/python -m pip install --quiet --upgrade pip
          .venv-paddle/bin/python -m pip install --quiet paddlepaddle paddleocr
          # yt-dlp de PIP (no el binari): cal per al plugin del PO-token, que permet
          # baixar frames SENSE cookies des de les IP de datacenter de GitHub.
          .venv-paddle/bin/python -m pip install --quiet -U yt-dlp bgutil-ytdlp-pot-provider
          .venv-paddle/bin/python -c "import paddleocr; print('paddleocr', paddleocr.__version__)"
          .venv-paddle/bin/yt-dlp --version

      - name: Start PO-token provider (yt-dlp sense cookies)
        run: |
          docker run --name bgutil-provider -d --init -p 127.0.0.1:4416:4416 brainicism/bgutil-ytdlp-pot-provider
          sleep 6
          docker ps --filter name=bgutil-provider --format '{{.Status}}'

      - name: Install node deps
        run: npm install --no-audit --no-fund

      - name: Read scoreboards (bucle auto-ritmat ~2 min)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          # yt-dlp de PIP (amb el plugin del PO-token) i el python del venv al PATH.
          export PATH="$PWD/.venv-paddle/bin:$PATH"
          # El PO-token provider (localhost:4416) fa que yt-dlp passi el control de
          # bot SENSE cookies. Les cookies queden com a FALLBACK opcional.
          if [ -n "$YOUTUBE_COOKIES" ]; then
            printf '%s' "$YOUTUBE_COOKIES" > /tmp/yt_cookies.txt
            export YT_COOKIES=/tmp/yt_cookies.txt
            echo "cookies: ACTIVES (fallback)"
          else
            echo "sense cookies → via PO-token provider"
          fi
          yt-dlp --version
          # El worker fa el BUCLE INTERN (~5,5 h) mantenint el sidecar PaddleOCR viu.
          node scripts/scoreboard_worker.js --loop --samples=5 || true
