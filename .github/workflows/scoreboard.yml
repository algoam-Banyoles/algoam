name: Live scoreboards (OCR)

# Llegeix per OCR els marcadors dels directes de YouTube dels opens en curs i els
# publica a Supabase (fcbillar.open_live_scores), perquè el web de FCBillar els
# mostri en viu. Bucle llarg (no s'acaba abans del següent tret → sense forats).
#
# REQUISITS (Settings → Secrets and variables → Actions):
#   - SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#   - YOUTUBE_COOKIES: contingut d'un cookies.txt (format Netscape) exportat del
#     navegador. CAL perquè YouTube bloqueja les IPs de datacenter de GitHub
#     ("Sign in to confirm you're not a bot"). Useu un compte de Google dedicat;
#     les cookies caduquen i s'han de refrescar de tant en tant.
#
# Finestra: dv/ds/dg 9:00–22:00 local (07–20 UTC estiu; hivern CET → '8-21').

on:
  schedule:
    - cron: '*/20 7-20 * * 5,6,0'
  workflow_dispatch: {}

concurrency:
  group: live-scoreboards
  cancel-in-progress: true

jobs:
  ocr:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ffmpeg + yt-dlp
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version && ffmpeg -version | head -1

      - name: Install node deps
        run: npm install --no-audit --no-fund

      - name: Read scoreboards (bucle auto-ritmat ~2 min)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            printf '%s' "$YOUTUBE_COOKIES" > /tmp/yt_cookies.txt
            export YT_COOKIES=/tmp/yt_cookies.txt
            echo "cookies de YouTube: ACTIVES"
          else
            echo "AVÍS: sense YOUTUBE_COOKIES → YouTube bloquejarà les IPs de GitHub i no es podrà llegir cap stream."
          fi
          END=$(( SECONDS + 21000 ))   # ~5,5 h de bucle continu
          i=0
          while [ "$SECONDS" -lt "$END" ]; do
            i=$(( i + 1 ))
            echo "::group::passada #$i (t=${SECONDS}s)"
            node scripts/scoreboard_worker.js --samples=3 || true
            echo "::endgroup::"
            [ "$SECONDS" -lt "$END" ] && sleep 30
          done
