name: Live notifications poll

on:
  schedule:
    # Minimum granularity on GitHub Actions is 5 minutes.
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape /streams of every channel and POST to worker
        working-directory: ./
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          POLL_SECRET: ${{ secrets.POLL_SECRET }}
        run: |
          if [ -z "$WORKER_URL" ] || [ -z "$POLL_SECRET" ]; then
            echo "WORKER_URL or POLL_SECRET not set; skipping."
            exit 0
          fi
          node scripts/poll_and_post.js
