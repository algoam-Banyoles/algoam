name: Scoreboard OCR poll

# Continuous poller for billiard scoreboard OCR. Each run lasts up to
# ~5h40min and the cron fires every 5h, so there's always at least one
# worker running (with brief overlap that's harmless because the worker
# just stores the latest payload). Public repo → unlimited Actions
# minutes, so this is the cloud-free way to keep the Marcadors tab
# populated 24/7 without a personal machine running.
#
# When no streams are live the poller idles cheaply: no yt-dlp / ffmpeg
# / OCR calls and no POSTs to the worker. Re-discovery happens every
# 5 minutes so a stream coming online during quiet hours is picked up.

on:
  schedule:
    # GitHub Actions cron min granularity is 5 minutes; we only need 5h.
    - cron: '0 */5 * * *'
  workflow_dispatch:

# Don't queue parallel runs of the same workflow — if one is still
# inside its 5h40min window when the next cron fires, GitHub will hold
# the new one until the old one finishes (a few minutes overlap).
concurrency:
  group: scoreboard-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    # Hard cap a few minutes below GitHub's 6h ceiling so the runner
    # itself can never SIGKILL us mid-cycle.
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scoreboard/requirements.txt

      - name: Install ffmpeg + yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install --upgrade --quiet yt-dlp

      - name: Install scoreboard deps
        run: pip install --quiet -r scoreboard/requirements.txt

      - name: Run poller
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          POLL_SECRET: ${{ secrets.POLL_SECRET }}
          PYTHONUNBUFFERED: '1'
        working-directory: scoreboard
        run: |
          if [ -z "$WORKER_URL" ] || [ -z "$POLL_SECRET" ]; then
            echo "WORKER_URL or POLL_SECRET not set; nothing to do."
            exit 0
          fi
          # Exit ~5h40min in so the next cron run can pick up almost
          # immediately. Cron fires every 5h → ~40min overlap that the
          # concurrency group serializes politely.
          python poll_loop.py --max-runtime 20400
