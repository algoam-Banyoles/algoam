<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Multiview — directes</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Multiview</h1>
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="channels" role="tab">Directes</button>
      <button class="tab-btn" data-tab="players" role="tab">
        Reproducció <span id="playerCount" class="badge"></span>
      </button>
    </nav>
  </header>

  <main>
    <section id="tab-channels" class="tab-panel active" role="tabpanel">
      <div class="channel-toolbar">
        <input id="searchInput" type="search" placeholder="Cercar canal…" autocomplete="off" />
        <label class="filter-toggle">
          <input type="checkbox" id="onlyLive" checked />
          <span>Només directes</span>
        </label>
        <span id="checkProgress" class="progress-text"></span>
      </div>
      <div id="channelCards"></div>
    </section>

    <section id="tab-players" class="tab-panel" role="tabpanel">
      <div id="video-container"></div>
    </section>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="canal.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("service-worker.js")
        .then(reg => reg.update())
        .catch(err => console.error("Error en SW:", err));
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
