<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Multiview — directes</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Multiview — directes</h1>

  <div id="video-container"></div>

  <section id="channelGrid">
    <div class="channel-toolbar">
      <label><input type="checkbox" id="onlyLive"> Només directes</label>
      <span id="checkProgress"></span>
    </div>
    <div id="channelCards"></div>
  </section>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="canal.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("service-worker.js")
        .then(reg => reg.update())
        .catch(err => console.error("Error en SW:", err));
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });
    }
    document.addEventListener('DOMContentLoaded', function() {
      if (window.M && M.AutoInit) M.AutoInit();
    });
  </script>
</body>
</html>
