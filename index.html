<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Billar en Directe</title>
  <meta name="author" content="Albert Gómez" />
  <meta name="generator" content="Desenvolupat amb Claude (Anthropic) — https://claude.com/claude-code" />
  <meta name="copyright" content="© 2026 Albert Gómez" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7a5cff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Billar en Directe</h1>
    <nav class="tabs" role="tablist">
      <button class="tab-btn active" data-tab="channels" role="tab">Directes</button>
      <button class="tab-btn" data-tab="players" role="tab">
        Reproducció <span id="playerCount" class="badge"></span>
      </button>
      <button class="tab-btn" data-tab="scores" role="tab">
        Marcadors <span id="scoresCount" class="badge"></span>
      </button>
    </nav>
  </header>
  <button id="hardRefreshBtn" class="hard-refresh-btn" type="button"
          title="Refresc complet (esborra caché)" aria-label="Refresc complet">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path fill="currentColor" d="M12 5V2L7 7l5 5V8c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 14c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 8.74A7.93 7.93 0 0 0 4 14c0 4.42 3.58 8 8 8v3l5-5-5-5v3z"/>
    </svg>
  </button>

  <button id="goLiveBtn" class="go-live-btn" type="button"
          title="Portar tots els reproductors al directe"
          aria-label="Portar tots els reproductors al directe">
    <span class="go-live-dot" aria-hidden="true"></span>
    <span class="go-live-label">DIRECTE</span>
  </button>

  <main>
    <section id="tab-channels" class="tab-panel active" role="tabpanel">
      <div class="channel-toolbar">
        <input id="searchInput" type="search" placeholder="Cercar canal…" autocomplete="off" />
        <label class="filter-toggle">
          <input type="checkbox" id="onlyLive" checked />
          <span>Només directes</span>
        </label>
      </div>
      <div id="channelCards"></div>
    </section>

    <section id="tab-players" class="tab-panel" role="tabpanel">
      <div id="video-container"></div>
    </section>

    <section id="tab-scores" class="tab-panel" role="tabpanel">
      <div class="scores-toolbar">
        <span id="scoresMeta" class="scores-meta"></span>
      </div>
      <div id="scoresGrid"></div>
      <p id="scoresEmpty" class="scores-empty">
        No hi ha marcadors disponibles.
        Engega el poller local
        (<code>scoreboard/poll_loop.py</code>) i recarrega.
      </p>
    </section>
  </main>

  <footer class="app-footer">
    <small>
      &copy; 2026 &middot; Desenvolupat per
      <img class="app-footer-logo" src="icons/logo-ag.png" alt="Albert Gómez Ametller" />
      i <a href="https://claude.com/claude-code" target="_blank" rel="noopener">Claude</a>
    </small>
  </footer>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="config.js"></script>
  <script src="canal.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker
        .register("service-worker.js")
        .then(reg => reg.update())
        .catch(err => console.error("Error en SW:", err));
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
